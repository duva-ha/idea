<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - 8/3 THPT TRẦN VĂN THÀNH</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --pink-dark: #ad1457; --gold: #ffd700; --glass: rgba(0,0,0,0.85); }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #ad1457, #4a0019); color: white; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }
        
        .header { background: #000; padding: 15px; border-bottom: 3px solid var(--gold); text-align: center; font-size: 1.6rem; font-weight: 900; color: var(--gold); text-transform: uppercase; }
        .layout { display: flex; gap: 20px; padding: 20px; flex: 1; }

        /* Cột trái: Bảng điểm trung bình */
        .score-panel { flex: 1; background: var(--glass); border-radius: 25px; border: 1px solid var(--gold); padding: 25px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .group-item { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 12px; 
            display: flex; align-items: center; justify-content: space-between; border-left: 5px solid var(--gold);
        }
        .group-name { font-weight: bold; font-size: 1.1rem; }
        .score-value { font-size: 2rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        /* Cột giữa: Giải Đặc Biệt */
        .draw-panel { flex: 2; background: var(--glass); border-radius: 25px; padding: 30px; border: 1px solid var(--gold); text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .lucky-title { font-size: 2.5rem; font-weight: 900; color: var(--gold); margin-bottom: 30px; text-shadow: 0 0 15px var(--gold); }
        .slot-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .slot { width: 70px; height: 110px; background: #000; border: 3px solid #444; border-radius: 12px; font-size: 4.5rem; font-weight: 900; display: flex; align-items: center; justify-content: center; color: white; transition: 0.3s; }
        .spinning { color: #00ff00; border-color: #00ff00; box-shadow: 0 0 20px #00ff00; }
        .winner-display { font-size: 2.8rem; font-weight: 900; color: white; min-height: 1.2em; text-transform: uppercase; background: linear-gradient(to right, transparent, rgba(255,215,0,0.2), transparent); padding: 10px; }

        /* Cột phải: Thống kê */
        .control-panel { flex: 0.7; background: var(--glass); border-radius: 25px; border: 1px solid var(--gold); padding: 25px; text-align: center; }
        .count-box { font-size: 4rem; font-weight: 900; color: var(--gold); margin: 20px 0; }
        .btn-mega { width: 100%; padding: 25px; font-size: 1.5rem; font-weight: 900; background: linear-gradient(to bottom, #ffd700, #ffa000); color: #4a0019; border: none; border-radius: 20px; cursor: pointer; box-shadow: 0 8px 0 #bf8f00; transition: 0.2s; }
        .btn-mega:active { transform: translateY(4px); box-shadow: 0 4px 0 #bf8f00; }
        .btn-mega:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body>

<div class="header">🌹 LỄ KỶ NIỆM 8/3 - THPT TRẦN VĂN THÀNH 🌹</div>

<div class="layout">
    <div class="score-panel">
        <h3 style="color: var(--gold); margin-top: 0; text-align: center;">📊 ĐIỂM TRUNG BÌNH CÁC TỔ</h3>
        <div id="groupList">
            </div>
    </div>

    <div class="draw-panel">
        <div class="lucky-title">🎁 GIẢI ĐẶC BIỆT 🎁</div>
        <div class="slot-group" id="slots">
            <div id="s1" class="slot">0</div>
            <div id="s2" class="slot">0</div>
            <div id="s3" class="slot">0</div>
            <div id="s4" class="slot">0</div>
            <div id="s5" class="slot">0</div>
            <div id="s6" class="slot">0</div>
        </div>
        <div class="winner-display" id="winnerName">---</div>
    </div>

    <div class="control-panel">
        <div style="font-size: 1rem; color: #aaa;">TỔNG NGƯỜI BÌNH CHỌN</div>
        <div class="count-box" id="countUser">0</div>
        <button class="btn-mega" id="spinBtn" onclick="startDraw()">QUAY SỐ</button>
        <p style="font-size: 0.8rem; color: #777; margin-top: 30px;">* Hệ thống tự động tính trung bình<br>từ dữ liệu thực tế.</p>
    </div>
</div>

<script>
    // 1. Cấu hình Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCZs0sGNdMxeS9cL_g9HeMf1LOlxzOUKf4",
        authDomain: "chamtn-26e8f.firebaseapp.com",
        projectId: "chamtn-26e8f",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. Danh sách 7 Tổ
    const groups = ["Văn phòng-Sử Địa", "Tiếng Anh", "Văn", "Toán", "Lý-CN", "Hóa-Sinh", "Tin KTPL-TDQP"];
    const winSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3");
    let totalParticipants = 0;

    // 3. Khởi tạo Giao diện bảng điểm
    function initUI() {
        const gList = document.getElementById('groupList');
        gList.innerHTML = ""; // Xóa dữ liệu cũ nếu có
        groups.forEach(g => {
            gList.innerHTML += `
                <div class="group-item">
                    <div class="group-name">${g}</div>
                    <div class="score-value" id="score-${g}">0.0</div>
                </div>`;
            
            // Lắng nghe điểm số realtime
            db.collection("points").doc(g).onSnapshot(doc => {
                renderScore(g, doc.exists ? doc.data().score : 0);
            });
        });
    }

    // 4. Hàm tính và hiển thị điểm trung bình
    function renderScore(groupName, totalScore) {
        const avg = totalParticipants > 0 ? (totalScore / totalParticipants).toFixed(1) : "0.0";
        const el = document.getElementById(`score-${groupName}`);
        if (el) el.innerText = avg;
    }

    // 5. Lắng nghe tổng số người tham gia
    db.collection("participants_83").onSnapshot(snap => {
        totalParticipants = snap.size;
        document.getElementById('countUser').innerText = totalParticipants;
        
        // Cập nhật lại toàn bộ bảng điểm khi có người mới (thay đổi mẫu số)
        groups.forEach(async (g) => {
            const doc = await db.collection("points").doc(g).get();
            renderScore(g, doc.exists ? doc.data().score : 0);
        });
    });

    // 6. Logic Quay số Giải Đặc Biệt
    async function startDraw() {
        const snap = await db.collection("participants_83").get();
        if(snap.size < 1) return alert("Chưa có ai tham gia bình chọn!");

        document.getElementById('spinBtn').disabled = true;
        const list = snap.docs.map(d => d.data());
        const winner = list[Math.floor(Math.random() * list.length)];

        // Gửi lệnh quay đồng bộ cho máy người chơi
        await db.collection("system_status").doc("current_draw").set({
            status: "SPINNING",
            winners: [winner],
            ts: Date.now()
        });

        document.getElementById('winnerName').innerText = "ĐANG TÌM CHỦ NHÂN...";

        // Chạy hiệu ứng quay 6 lồng số
        for(let s=1; s<=6; s++) {
            const el = document.getElementById(`s${s}`);
            el.classList.add('spinning');
            let startTime = Date.now();
            while(Date.now() - startTime < (2000 + s * 400)) {
                el.innerText = Math.floor(Math.random() * 10);
                await new Promise(r => setTimeout(r, 50));
            }
            el.innerText = winner.number[s-1];
            el.classList.remove('spinning');
        }

        document.getElementById('winnerName').innerText = winner.name;
        winSound.play();
        confetti({ particleCount: 400, spread: 120, origin: { y: 0.6 } });
        
        document.getElementById('spinBtn').disabled = false;
        await db.collection("system_status").doc("current_draw").update({ status: "DONE" });
    }

    // Chạy khởi tạo ngay khi load trang
    initUI();
</script>
</body>
</html>
