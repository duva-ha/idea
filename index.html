<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - 8/3 THPT TRẦN VĂN THÀNH</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --pink-dark: #ad1457; --gold: #ffd700; --glass: rgba(0,0,0,0.85); }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #ad1457, #4a0019); color: white; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { background: #000; padding: 15px; border-bottom: 3px solid var(--gold); text-align: center; font-size: 1.4rem; font-weight: 900; color: var(--gold); }
        .layout { display: flex; gap: 20px; padding: 20px; flex: 1; }

        /* Cột trái: Quản lý Điểm các Tổ */
        .score-panel { flex: 1.2; background: var(--glass); border-radius: 20px; border: 1px solid var(--gold); padding: 20px; }
        .group-item { 
            background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; margin-bottom: 10px; 
            display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--gold);
        }
        .group-name { font-weight: bold; font-size: 0.9rem; flex: 1; }
        .score-control { display: flex; align-items: center; gap: 10px; }
        .score-value { font-size: 1.5rem; font-weight: 900; color: var(--gold); min-width: 50px; text-align: center; }
        .btn-adj { width: 35px; height: 35px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .btn-plus { background: #4caf50; color: white; }
        .btn-minus { background: #f44336; color: white; }

        /* Cột giữa: Quay số dự thưởng */
        .draw-panel { flex: 2; background: var(--glass); border-radius: 20px; padding: 20px; border: 1px solid var(--gold); text-align: center; }
        .winner-row { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; margin-bottom: 8px; }
        .slot { width: 45px; height: 65px; background: #000; border: 2px solid #444; border-radius: 8px; font-size: 2.5rem; font-weight: 900; display: flex; align-items: center; justify-content: center; color: white; }
        .spinning { color: #00ff00; border-color: #00ff00; }
        .winner-name { flex: 1; text-align: left; padding-left: 15px; font-size: 1.1rem; color: var(--gold); font-weight: bold; }

        /* Cột phải: Thống kê & Nút bấm */
        .control-panel { flex: 0.8; background: var(--glass); border-radius: 20px; border: 1px solid var(--gold); padding: 20px; text-align: center; }
        .btn-mega { width: 100%; padding: 20px; font-size: 1.2rem; font-weight: 900; background: linear-gradient(to bottom, #ffd700, #ffa000); color: #4a0019; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 #bf8f00; margin-top: 20px; }
        .btn-mega:disabled { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>

<div class="header">🌹 ĐIỀU PHỐI LỄ KỶ NIỆM 8/3 - THPT TRẦN VĂN THÀNH 🌹</div>

<div class="layout">
    <div class="score-panel">
        <h3 style="color: var(--gold); margin-top: 0;">📊 ĐIỂM TRUNG BÌNH CÁC TỔ</h3>
        <div id="groupList"></div>
    </div>

    <div class="draw-panel">
        <div id="drawUI"></div>
        <div id="statusLabel" style="margin-top:15px; color: var(--gold); font-weight: bold;">SẴN SÀNG QUAY THƯỞNG</div>
    </div>

    <div class="control-panel">
        <div style="font-size: 0.8rem; color: #aaa;">TỔNG NGƯỜI DỰ THƯỞNG</div>
        <div style="font-size: 3rem; font-weight: 900; color: var(--gold);" id="countUser">0</div>
        <button class="btn-mega" id="spinBtn" onclick="startDraw()">QUAY SỐ MAY MẮN</button>
        <p style="font-size: 0.7rem; color: #666; margin-top: 20px;">* Điểm trung bình = Tổng điểm / Số người tham gia.</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCZs0sGNdMxeS9cL_g9HeMf1LOlxzOUKf4",
        authDomain: "chamtn-26e8f.firebaseapp.com",
        projectId: "chamtn-26e8f",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const groups = ["Văn phòng-Sử Địa", "Tiếng Anh", "Văn", "Toán", "Lý-CN", "Hóa-Sinh", "Tin KTPL-TDQP"];
    const winSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3");
    
    let totalParticipants = 0; // Biến lưu số người chơi hiện tại

    // Khởi tạo giao diện
    function initUI() {
        const gList = document.getElementById('groupList');
        groups.forEach(g => {
            gList.innerHTML += `
                <div class="group-item">
                    <div class="group-name">${g}</div>
                    <div class="score-control">
                        <button class="btn-adj btn-minus" onclick="updateScore('${g}', -1)">-</button>
                        <div class="score-value" id="score-${g}">0.0</div>
                        <button class="btn-adj btn-plus" onclick="updateScore('${g}', 1)">+</button>
                    </div>
                </div>`;
            
            // Lắng nghe điểm tổng của từng tổ và tính trung bình
            db.collection("points").doc(g).onSnapshot(doc => {
                renderAvgScore(g, doc.data());
            });
        });

        const dUI = document.getElementById('drawUI');
        for(let r=1; r<=6; r++) {
            dUI.innerHTML += `
                <div class="winner-row">
                    <div style="color:var(--gold); font-weight:900; width:60px;">GIẢI ${r}</div>
                    <div style="display:flex; gap:4px;">
                        ${Array(6).fill(0).map((_, s) => `<div id="r${r}s${s+1}" class="slot">0</div>`).join('')}
                    </div>
                    <div class="winner-name" id="name${r}">---</div>
                </div>`;
        }
    }

    // Hàm tính và hiển thị điểm trung bình
    function renderAvgScore(groupName, data) {
        const totalScore = (data && data.score) ? data.score : 0;
        const avg = totalParticipants > 0 ? (totalScore / totalParticipants).toFixed(1) : "0.0";
        const scoreEl = document.getElementById(`score-${groupName}`);
        if(scoreEl) scoreEl.innerText = avg;
    }

    // Hàm làm mới toàn bộ bảng điểm khi số người tham gia thay đổi
    function refreshAllScores() {
        groups.forEach(async (g) => {
            const doc = await db.collection("points").doc(g).get();
            renderAvgScore(g, doc.data());
        });
    }

    // Cập nhật điểm lên Firebase (vẫn cộng vào điểm tổng)
    async function updateScore(group, val) {
        const ref = db.collection("points").doc(group);
        await ref.set({ 
            score: firebase.firestore.FieldValue.increment(val) 
        }, { merge: true });
    }

    // Lắng nghe tổng số người chơi từ collection
    db.collection("participants_83").onSnapshot(snap => {
        totalParticipants = snap.size;
        document.getElementById('countUser').innerText = totalParticipants;
        refreshAllScores(); // Cập nhật lại trung bình cho tất cả các tổ
    });

    async function startDraw() {
        const snap = await db.collection("participants_83").get();
        if(snap.size < 6) return alert("Chưa đủ 6 người tham gia!");
        
        document.getElementById('spinBtn').disabled = true;
        let list = snap.docs.map(d => d.data());
        let winners = [];
        for(let i=0; i<6; i++) {
            winners.push(list.splice(Math.floor(Math.random()*list.length), 1)[0]);
        }

        await db.collection("system_status").doc("current_draw").set({
            status: "SPINNING",
            winners: winners,
            ts: Date.now()
        });

        let promises = winners.map((winner, rIdx) => {
            return new Promise(async (res) => {
                const r = rIdx + 1;
                for(let s=1; s<=6; s++) {
                    const el = document.getElementById(`r${r}s${s}`);
                    el.classList.add('spinning');
                    let start = Date.now();
                    while(Date.now() - start < (1500 + rIdx*500 + s*150)) {
                        el.innerText = Math.floor(Math.random()*10);
                        await new Promise(r => setTimeout(r, 50));
                    }
                    el.innerText = winner.number[s-1];
                    el.classList.remove('spinning');
                }
                document.getElementById(`name${r}`).innerText = winner.name.toUpperCase();
                winSound.play();
                res();
            });
        });

        await Promise.all(promises);
        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        document.getElementById('spinBtn').disabled = false;
        await db.collection("system_status").doc("current_draw").update({ status: "DONE" });
    }

    initUI();
</script>
</body>
</html>
